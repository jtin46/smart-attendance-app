<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Attendance - Login</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-box">
      <h1>Smart Attendance</h1>
      
      <!-- Role Selection -->
      <div class="role-selector">
        <div class="role-btn" data-role="admin" onclick="selectRole('admin')">Admin</div>
        <div class="role-btn active" data-role="teacher" onclick="selectRole('teacher')">Teacher</div>
        <div class="role-btn" data-role="student" onclick="selectRole('student')">Student</div>
      </div>
      
      <form id="loginForm">
        <div id="college_code_field">
          <input type="text" id="college_code" placeholder="College Code" required>
        </div>
        <input type="text" id="login_username" placeholder="Username" required>
        <input type="password" id="login_password" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>
      
      <div class="extra-link">
        <a href="signup.html">Don't have an account? Sign Up</a>
      </div>
      <div id="loginStatus" class="status-message"></div>
    </div>
  </div>

  <!-- Demo Credentials -->
  <div class="demo-credentials">
    <h4>Demo Credentials:</h4>
    <p><strong>Admin:</strong> admin1 / admin123 (no college code needed)</p>
    <p><strong>Teacher:</strong> teacher1 / teacher123 (Code: TECH2024)</p>
    <p><strong>Student:</strong> student1 / student123 (Code: TECH2024)</p>
  </div>
</body>
</html>
