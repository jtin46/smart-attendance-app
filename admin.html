<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin Dashboard</title>
      <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Admin <span id="logout">Logout</span></h1>
  </header>
  <section>
      <h2>Create College</h2>
      <label for="collegeName" class="visually-hidden">College Name</label>
      <input id="collegeName" name="collegeName" placeholder="Enter College Name">
      <button onclick="createCollege()">Create</button>
    <span id="createMsg" class="msg"></span>
    <div id="created"></div>
    
    <h2>View Users by College</h2>
    <label for="code" class="visually-hidden">College Code</label>
    <input id="code" name="code" placeholder="Enter College Code">
    <button onclick="loadUsers()">Load Users</button>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Year</th>
            <th>Dept</th>
            <th>Div</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="8" style="text-align:center;">No data loaded</td></tr>
        </tbody>
      </table>
    </div>
  </section>
  <section>
    <h2>Manage College Structure</h2>
    <p>Enter a college code below to manage its years and departments.</p>
    <div>
        <label for="manageCode">College Code:</label>
        <input id="manageCode" type="text" placeholder="Enter code to manage">
        <button onclick="loadCollegeStructure()">Load Structure</button>
    </div>

    <div id="structure-management" style="display: flex; gap: 20px; margin-top: 20px;">
        <div style="flex: 1;">
            <h3>Years</h3>
            <input id="yearName" placeholder="New Year Name (e.g., First Year)">
            <button onclick="addStructureItem('years')">Add</button>
            <ul id="years-list"></ul>
        </div>
        <div style="flex: 1;">
            <h3>Departments</h3>
            <input id="departmentName" placeholder="New Dept Name (e.g., COMPS)">
            <button onclick="addStructureItem('departments')">Add</button>
            <ul id="departments-list"></ul>
        </div>
    </div>
</section>
<script>
const token = localStorage.getItem('token');
if(!token || localStorage.getItem('role') !== 'admin') {
    alert('Admin login required');
    window.location.href = 'login.html';
}

document.addEventListener('DOMContentLoaded', () => {
    const logoutBtn = document.getElementById('logout');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', () => {
            localStorage.clear();
            location.href = 'login.html';
        });
    }
});

async function createCollege(){
    const name = document.getElementById('collegeName').value.trim();
    if(!name) return;
    const res = await fetch('/admin/college', { method:'POST', headers:{ 'Authorization':'Bearer '+token, 'Content-Type':'application/json' }, body: JSON.stringify({ name }) });
    const data = await res.json();
    document.getElementById('created').innerHTML = `<p><strong>${data.name}</strong> → Share this code: <code>${data.code}</code></p>`;
}

async function loadUsers(){
  const code = document.getElementById('code').value.trim();
  if(!code) return;
  const res = await fetch('/admin/users?code='+code, { headers:{ 'Authorization':'Bearer '+token }});
  const list = await res.json();
  const tbody = document.getElementById('rows');
  tbody.innerHTML = '';
  if(!list || list.length === 0){
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">No users found for this college code.</td></tr>';
      return;
  }
  list.forEach(u=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `
        <td>${u.id}</td>
        <td>${u.name}</td>
        <td>${u.email}</td>
        <td>${u.role}</td>
        <td>${u.year || '-'}</td>
        <td>${u.department || '-'}</td>
        <td>${u.division || '-'}</td>
        <td>
            <button class="small" onclick="deleteUser(${u.id})">Delete</button>
        </td>
    `;
    tbody.appendChild(tr);
  });
}

async function deleteUser(userId) {
    if (!confirm('Are you sure you want to delete this user? This action cannot be undone.')) {
        return;
    }
    try {
        const res = await fetch(`/admin/users/${userId}`, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.ok) {
            alert('User deleted successfully.');
            loadUsers();
        } else {
            const data = await res.json();
            alert('Error deleting user: ' + (data.error || 'Unknown error.'));
        }
    } catch (err) {
        console.error("Error deleting user:", err);
        alert('Network error. Failed to delete user.');
    }
}

async function loadCollegeStructure() {
    const collegeCode = document.getElementById('manageCode').value.trim();
    if (!collegeCode) return alert("Please enter a college code to load its structure.");

    const res = await fetch(`/admin/structure/${collegeCode}`, { headers: { 'Authorization': 'Bearer ' + token } });
    const data = await res.json();
    
    const renderList = (type, items) => {
        const listEl = document.getElementById(`${type}-list`);
        listEl.innerHTML = '';
        items.forEach(item => {
            const li = document.createElement('li');
            li.textContent = item.name;
            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = 'x';
            deleteBtn.style.marginLeft = '10px';
            deleteBtn.onclick = () => deleteStructureItem(type, item.id);
            li.appendChild(deleteBtn);
            listEl.appendChild(li);
        });
    };
    
    renderList('years', data.years || []);
    renderList('departments', data.departments || []);
}

async function addStructureItem(type) {
    const collegeCode = document.getElementById('manageCode').value.trim();
    if (!collegeCode) return alert("Please load a college structure first.");
    
    const nameInput = document.getElementById(`${type.slice(0, -1)}Name`);
    const name = nameInput.value.trim();
    if (!name) return alert("Name cannot be empty.");

    await fetch('/admin/structure', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ collegeCode, type, name })
    });
    
    nameInput.value = '';
    loadCollegeStructure();
}

async function deleteStructureItem(type, id) {
    if (!confirm("Are you sure you want to delete this item?")) return;
    await fetch(`/admin/structure/${type}/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
    });
    loadCollegeStructure();
}
</script>
</body>
</html>
